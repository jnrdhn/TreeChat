<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>TreeChat</title>
    <script>
      // GitHub Pages SPA redirect trick.
      // When GH Pages 404s on a path like /TreeChat/some-route,
      // it serves this file. We encode the path into the query
      // string and redirect to the root, where the app picks it up.
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 2).join('/') +
        '/?p=/' + l.pathname.slice(1).split('/').slice(1).join('/').replace(/&/g, '~and~') +
        (l.search ? '&q=' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
